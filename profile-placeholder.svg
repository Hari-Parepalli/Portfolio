<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#2563eb"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="50" fill="#D9D9D9"/>
  
  <!-- Body -->
  <rect x="150" y="180" width="100" height="120" rx="20" fill="#D9D9D9"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#grad)"/>
</svg>